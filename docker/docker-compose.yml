services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: openbackup
      POSTGRES_USER: openbackup
      POSTGRES_PASSWORD: openbackup
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  api:
    build:
      context: ../backend
    environment:
      SECRET_KEY: super-secret-key-change-me
      DATABASE_URL: postgresql://openbackup:openbackup@db:5432/openbackup
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: backups
      MINIO_SECURE: "false"
    depends_on:
      - db
      - minio
    ports:
      - "8000:8000"

volumes:
  postgres_data:
  minio_data:
